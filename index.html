<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atharv Bidri — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'DM Sans',sans-serif;background:#0a1628;color:#fff}
nav{position:fixed;top:0;width:100%;background:#0a1628;padding:10px 20px;display:flex;justify-content:space-between}
nav a{color:#c9a84c;text-decoration:none;margin:0 10px}
section{padding:80px 20px;text-align:center}
.hero{margin-top:60px}
img{max-width:100%}
.btn{background:#c9a84c;color:#000;padding:10px 20px;border-radius:5px;text-decoration:none;margin:5px;display:inline-block}
.fade{opacity:0;transform:translateY(20px);transition:1s}
.fade.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<nav>
<div>Atharv</div>
<div>
<a href="#home">Home</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</div>
</nav>

<section id="home" class="hero fade">
<h1>Atharv Bidri</h1>
<p>B.Tech CSE Student | Developer</p>
<a href="resume.pdf" class="btn" download>Download Resume</a>
</section>

<section id="projects" class="fade">
<h2>Projects</h2>
<p>Android App, AI Chatbot, Data Analysis</p>
</section>

<section id="contact" class="fade">
<h2>Contact</h2>
<p>Email: your@email.com</p>
</section>

<script>
const elements = document.querySelectorAll('.fade');
window.addEventListener('scroll', ()=>{
  elements.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight-50){el.classList.add('show');}
  })
})
</script>

</body>
</html>
