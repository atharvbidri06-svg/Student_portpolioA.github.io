<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Portfolio</title>
<style>
body{margin:0;font-family:sans-serif;background:#0a1628;color:#fff}
section{padding:60px 20px;text-align:center}
img{max-width:100%}
button{cursor:pointer}
.hero img{width:150px;height:150px;border-radius:50%;border:4px solid gold}
.projects{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#111;padding:15px;border-radius:10px}
</style>
</head>
<body>

<section class="hero">
<h1 id="name">Atharv Bidri</h1>
<img id="photo.jpg" src="" alt="profile">
<p id="bio">Click to edit your bio</p>
</section>

<section>
<button onclick="addCertificate()">➕ Add Certificate</button>
<div class="projects" id="certContainer"></div>
</section>

<script>
// PROFILE IMAGE
const profile = document.getElementById("profile-photo");
profile.onclick = () => {
  let input=document.createElement("input");
  input.type="file";
  input.accept="image/*";
  input.onchange=e=>{
    let reader=new FileReader();
    reader.onload=()=>{
      profile.src=reader.result;
      localStorage.setItem("profile",reader.result);
    };
    reader.readAsDataURL(e.target.files[0]);
  };
  input.click();
};

if(localStorage.getItem("profile")){
  profile.src=localStorage.getItem("profile");
}

// BIO EDIT
const bio=document.getElementById("bio");
bio.onclick=()=>{
  let text=prompt("Edit bio:",bio.innerText);
  if(text){
    bio.innerText=text;
    localStorage.setItem("bio",text);
  }
};

if(localStorage.getItem("bio")){
  bio.innerText=localStorage.getItem("bio");
}

// CERTIFICATES
function addCertificate(){
  let title=prompt("Enter title");
  let input=document.createElement("input");
  input.type="file";
  input.accept="image/*";

  input.onchange=e=>{
    let reader=new FileReader();
    reader.onload=()=>{
      let data=JSON.parse(localStorage.getItem("certs")||"[]");
      data.push({img:reader.result,title:title});
      localStorage.setItem("certs",JSON.stringify(data));
      render();
    };
    reader.readAsDataURL(e.target.files[0]);
  };

  input.click();
}

function deleteCert(i){
  let data=JSON.parse(localStorage.getItem("certs"));
  data.splice(i,1);
  localStorage.setItem("certs",JSON.stringify(data));
  render();
}

function render(){
  let container=document.getElementById("certContainer");
  container.innerHTML="";
  let data=JSON.parse(localStorage.getItem("certs")||"[]");

  data.forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${c.img}">
      <h3>${c.title}</h3>
      <button onclick="deleteCert(${i})">Delete</button>
    `;
    container.appendChild(div);
  });
}

render();
</script>

</body>
</html>
